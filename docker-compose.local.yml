services:
  web:
    image: htmlgraphic/apache:2.1.0
    platform: linux/arm64
    container_name: apache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - NODE_ENVIRONMENT=dev
    volumes:
      - '~/SITES/docker:/data' # Preferred local working dir
     #- '/c/Users/southpark/docker:/data'
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "pidof", "apache2"]
      interval: 30s
      timeout: 3s
    networks:
      - app-network

  db:
    image: mariadb:10.6
    platform: linux/arm64
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: app_db
    volumes:
      - 'db-data:/var/lib/mysql'
    ports:
      - "3306:3306"
    command: mysqld --sql_mode="ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    networks:
      - app-network

volumes:
  db-data:
    name: db-data

networks:
  app-network:
    driver: bridge
