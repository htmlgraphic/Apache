version: 2.1

jobs:
  build:
    parameters:
      env:
        type: string
      log_prefix:
        type: string
    working_directory: ~/project
    docker:
      - image: ubuntu-2204:2023.04.2
    resource_class: arm.medium
    environment:
      DOCKER_VERSION: 20.10
      BUILD_PATH: ~/project
      CONTAINER_NAME: apache
    steps:
      - checkout
      - run:
          name: Create container-build Directory
          command: |
            rm -rf ~/project/container-build
            mkdir -p ~/project/container-build
      - setup_remote_docker:
          version: 20.10
      - run:
          name: Install Dependencies
          command: |
            apk add --no-cache make docker-compose
      - run:
          name: Build << parameters.env >> Apache Docker Image
          command: |
            cp .env.example .env
            echo "NODE_ENVIRONMENT=<< parameters.env >>" >> .env
            echo "BUILD_ENV=<< parameters.env >>" >> .env
            echo "MYSQL_DATABASE=htmlgraphic" >> .env
            echo "MYSQL_ROOT_PASSWORD=new_passwordac" >> .env
            echo "MYSQL_USER=admin" >> .env
            echo "MYSQL_PASSWORD=new_password" >> .env
            echo "SASL_USER=$CIRCLE_SASL_USER" >> .env
            echo "SASL_PASS=$CIRCLE_SASL_PASS" >> .env
            echo "SMTP_HOST=sandbox.smtp.mailtrap.io" >> .env
            echo "LOG_TOKEN=$CIRCLE_LOG_TOKEN" >> .env
            make build || { echo "Build failed"; docker images; exit 1; }
      - run:
          name: Start << parameters.env >> Container
          command: |
            set -x
            pwd
            ls -la
            ls -la ~/project/tests || echo "Tests directory not found"
            cat .env
            make run || { echo "Container start failed"; docker ps -a; docker logs ${CONTAINER_NAME}; exit 1; }
            docker ps -a
            # Wait for supervisord
            for i in {1..120}; do
              if docker exec ${CONTAINER_NAME} supervisorctl status | grep -q "RUNNING"; then
                echo "Supervisord services are running"
                break
              fi
              echo "Waiting for supervisord..."
              sleep 2
            done
            if [ $i -eq 120 ]; then
              echo "Supervisord failed to start within 240 seconds"
              docker exec ${CONTAINER_NAME} cat /etc/supervisor/supervisord.conf || echo "Supervisord config not found"
              docker exec ${CONTAINER_NAME} ls -la /var/run /var/log/supervisor
              docker exec ${CONTAINER_NAME} supervisorctl status
              docker logs ${CONTAINER_NAME}
              exit 1
            fi
            # Wait for Apache
            for i in {1..30}; do
              if curl -s -o /dev/null http://127.0.0.1; then
                echo "Apache is ready"
                break
              fi
              echo "Waiting for Apache..."
              sleep 2
            done
            if [ $i -eq 30 ]; then
              echo "Apache failed to start within 60 seconds"
              docker logs ${CONTAINER_NAME}
              exit 1
            fi
            # Wait for MySQL
            if docker ps -a | grep apache-db-1; then
              for i in {1..30}; do
                if docker exec apache-db-1 mysqladmin ping -h 127.0.0.1 -u admin -pnew_password --silent; then
                  echo "MySQL is ready"
                  break
                fi
                echo "Waiting for MySQL..."
                sleep 2
              done
              if [ $i -eq 30 ]; then
                echo "MySQL failed to start within 60 seconds"
                docker logs apache-db-1
                exit 1
              fi
            fi
      - run:
          name: Setup Test Environment
          command: |
            docker exec ${CONTAINER_NAME} /bin/bash -c "mkdir -p /root/project/container-build && chown www-data:www-data /root/project/container-build"
      - run:
          name: Debug Test Script
          command: |
            docker exec ${CONTAINER_NAME} /bin/bash -c "ls -la /opt/tests || echo 'Test directory not found'; cat /opt/tests/build_tests.sh || echo 'build_tests.sh not found'; chmod +x /opt/tests/build_tests.sh || echo 'Failed to set executable permissions'; env | grep -E 'NODE_ENVIRONMENT|SASL_USER|SASL_PASS|LOG_TOKEN'; supervisorctl status || echo 'Supervisorctl failed'; ls -la /root/project/container-build || echo 'Test directory not found'; php -m | grep -E 'mcrypt|redis' || echo 'PHP extensions mcrypt/redis not found'; ls -la /etc/php/8.3/*/conf.d/*mcrypt* /etc/php/8.3/*/conf.d/*redis* || echo 'PHP extension configs not found'; cat /etc/environment || echo 'Environment file not found'"
      - run:
          name: << parameters.env >> Build Tests
          command: |
            docker exec ${CONTAINER_NAME} /bin/bash -c "export SASL_USER=$CIRCLE_SASL_USER SASL_PASS=$CIRCLE_SASL_PASS LOG_TOKEN=$CIRCLE_LOG_TOKEN NODE_ENVIRONMENT=<< parameters.env >> && su -s /bin/bash www-data -c 'sed -E \"/systemctl|docker/ d\" /opt/tests/build_tests.sh | bash' || { echo 'Tests failed'; supervisorctl status; docker logs ${CONTAINER_NAME}; cat /var/log/supervisor/supervisord.log; exit 1; }"
      - run:
          name: Collect << parameters.env >> Container Logs
          command: |
            echo "Collecting logs for ${CONTAINER_NAME}"
            docker logs ${CONTAINER_NAME} > ${BUILD_PATH}/log_output-<< parameters.log_prefix >>_Apache.txt 2>&1
            if docker ps -a | grep apache-db-1; then
              echo "Collecting logs for apache-db-1"
              docker logs apache-db-1 > ${BUILD_PATH}/log_output-<< parameters.log_prefix >>_MySQL.txt 2>&1
            else
              echo "No apache-db-1 container found; skipping MySQL logs"
            fi
      - run:
          name: Kill << parameters.env >> Containers
          command: |
            make stop
      - store_artifacts:
          path: ~/project
          destination: build-logs-<< parameters.env >>

workflows:
  build_and_test:
    jobs:
      - build:
          name: build-dev
          env: dev
          log_prefix: DEV
      - build:
          name: build-production
          env: production
          log_prefix: LIVE
