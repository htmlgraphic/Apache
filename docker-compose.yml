services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_ENV: production
    platform: linux/arm64
    image: htmlgraphic/apache:2.1.0
    container_name: apache-web-1
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    environment:
      - NODE_ENVIRONMENT=production
    volumes:
      - '/var/data:/data'
      - '/var/data/letsencrypt:/etc/letsencrypt'
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "pidof", "apache2"]
      interval: 30s
      timeout: 3s
    networks:
      - app-network

  db:
    image: mysql:8.3.0
    platform: linux/arm64
    container_name: apache-db-1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: app_db
    volumes:
      - 'db-data:/var/lib/mysql'
    ports:
      - "3306:3306"
    command: mysqld --sql_mode="ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION"
    networks:
      - app-network

volumes:
  db-data:
    name: db-data

networks:
  app-network:
    driver: bridge
